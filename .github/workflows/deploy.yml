name: Deploy

on:
  push:
    branches: [main]

# Cancel any in-progress deploy if a new push arrives
concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight deploy — let it finish

jobs:
  # ─── Run CI first ───────────────────────────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─── Run Prisma Migrations ─────────────────────────────────────────────────
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: ci

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations (direct connection — bypasses PgBouncer)
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}   # port 5432, not 6543
        run: npx prisma migrate deploy

  # ─── Trigger Render Deploy ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"

  # ─── Trigger Vercel Deploy ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: ci   # Frontend doesn't need migrations — deploy in parallel with backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
