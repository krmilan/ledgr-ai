name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ─── CI Gate ────────────────────────────────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─── Deploy Backend → Render ─────────────────────────────────────────────────
  # Migrations are run manually (Supabase blocks port 5432 from CI runners).
  # Run: cd backend && npx prisma migrate deploy
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"

  # NOTE: Frontend is deployed automatically by Vercel's native Git integration.
  # No GitHub Actions step needed — Vercel watches the main branch directly.
  # This avoids env var injection issues with the Vercel CLI.